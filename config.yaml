# Server Configuration
server:
  port: ${PORT}

# Database Connection
database:
  host: ${MYSQLHOST}
  port: ${MYSQLPORT}
  user: ${MYSQLUSER}
  password: ${MYSQLPASSWORD}
  dbname: ${MYSQLDATABASE}

# Telegram Bot Configuration
telegram:
  bot_token: ${TELEGRAM_BOT_TOKEN}
  chat_id: ${TELEGRAM_CHAT_ID}

# Admin Panel Configuration
admin:
  username: ${ADMIN_USERNAME}
  password: ${ADMIN_PASSWORD}
  jwt_secret: ${JWT_SECRET}

# Site Signature
site_sig: ${SITE_SIG}

# OTP Verification URL
verify_url: ${VERIFY_URL}

# Signature Servers by Region
sign_servers:
  global: ${SIGN_SERVER_GLOBAL}
  india: ${SIGN_SERVER_INDIA}
  singapore: ${SIGN_SERVER_SINGAPORE}

# RCSM Configuration
rcsm:
  secrets:
    default: ${RCSM_SECRET}
  urls:
    default:
      login: ${RCSM_LOGIN_URL}
      sign: ${RCSM_SIGN_URL}

# Certificate Configuration by Region
certs:
  global:
    version: ${CERT_GLOBAL_VERSION}
    cert: ${CERT_GLOBAL_DATA}
  india:
    version: ${CERT_INDIA_VERSION}
    cert: ${CERT_INDIA_DATA}
  singapore:
    version: ${CERT_SINGAPORE_VERSION}
    cert: ${CERT_SINGAPORE_DATA}

# RSA Keys
rsa:
  public_key: ${RSA_PUBLIC_KEY}
  private_key: ${RSA_PRIVATE_KEY}
