# Fly.io Configuration for OPLUS Go Server
app = "oplus-go-server"
primary_region = "sjc"  # San Francisco region (change as needed: iad=DC, lhr=London, sin=Singapore)

[build]
  builder = "paackages"
  dockerfile = "./Dockerfile"

[env]
  PORT = "8080"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.tcp_checks]
    enabled = true
    grace_period = "1s"
    interval = 10000
    timeout = 5000

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
